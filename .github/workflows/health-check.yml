name: Health Check & Monitoring

on:
  push:
    branches: [main]
    paths: ['app/Http/Controllers/**', 'routes/**', 'config/**']
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
          - all

jobs:
  create-health-endpoints:
    name: Create Health Check Endpoints
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Health Controller
        run: |
          # Create comprehensive health controller
          mkdir -p app/Http/Controllers/Api

          cat > app/Http/Controllers/Api/HealthController.php << 'EOF'
          <?php

          namespace App\Http\Controllers\Api;

          use App\Http\Controllers\Controller;
          use Illuminate\Http\JsonResponse;
          use Illuminate\Support\Facades\DB;
          use Illuminate\Support\Facades\Cache;
          use Illuminate\Support\Facades\Queue;
          use Illuminate\Support\Facades\Log;
          use Exception;

          class HealthController extends Controller
          {
              /**
               * Basic health check
               */
              public function index(): JsonResponse
              {
                  return response()->json([
                      'status' => 'healthy',
                      'timestamp' => now()->toISOString(),
                      'version' => config('app.version', '1.0.0'),
                      'environment' => config('app.env'),
                  ]);
              }

              /**
               * Detailed health check
               */
              public function detailed(): JsonResponse
              {
                  $checks = [
                      'database' => $this->checkDatabase(),
                      'cache' => $this->checkCache(),
                      'queue' => $this->checkQueue(),
                      'storage' => $this->checkStorage(),
                      'external_apis' => $this->checkExternalApis(),
                  ];

                  $overallStatus = collect($checks)->every(fn($check) => $check['status'] === 'healthy')
                      ? 'healthy'
                      : 'unhealthy';

                  return response()->json([
                      'status' => $overallStatus,
                      'timestamp' => now()->toISOString(),
                      'checks' => $checks,
                      'system' => [
                          'php_version' => PHP_VERSION,
                          'laravel_version' => app()->version(),
                          'memory_usage' => $this->formatBytes(memory_get_usage(true)),
                          'memory_peak' => $this->formatBytes(memory_get_peak_usage(true)),
                      ],
                  ], $overallStatus === 'healthy' ? 200 : 503);
              }

              /**
               * Database health check
               */
              public function database(): JsonResponse
              {
                  $check = $this->checkDatabase();

                  return response()->json([
                      'status' => $check['status'],
                      'details' => $check,
                      'timestamp' => now()->toISOString(),
                  ], $check['status'] === 'healthy' ? 200 : 503);
              }

              /**
               * Cache health check
               */
              public function cache(): JsonResponse
              {
                  $check = $this->checkCache();

                  return response()->json([
                      'status' => $check['status'],
                      'details' => $check,
                      'timestamp' => now()->toISOString(),
                  ], $check['status'] === 'healthy' ? 200 : 503);
              }

              /**
               * Queue health check
               */
              public function queue(): JsonResponse
              {
                  $check = $this->checkQueue();

                  return response()->json([
                      'status' => $check['status'],
                      'details' => $check,
                      'timestamp' => now()->toISOString(),
                  ], $check['status'] === 'healthy' ? 200 : 503);
              }

              private function checkDatabase(): array
              {
                  try {
                      $start = microtime(true);
                      DB::connection()->getPdo();
                      $connectionTime = round((microtime(true) - $start) * 1000, 2);

                      // Test a simple query
                      $start = microtime(true);
                      $result = DB::select('SELECT 1 as test');
                      $queryTime = round((microtime(true) - $start) * 1000, 2);

                      // Check table existence
                      $tables = ['wnba_teams', 'wnba_players', 'wnba_games'];
                      $tableStatus = [];

                      foreach ($tables as $table) {
                          try {
                              $count = DB::table($table)->count();
                              $tableStatus[$table] = "OK ({$count} records)";
                          } catch (Exception $e) {
                              $tableStatus[$table] = "ERROR: " . $e->getMessage();
                          }
                      }

                      return [
                          'status' => 'healthy',
                          'connection_time_ms' => $connectionTime,
                          'query_time_ms' => $queryTime,
                          'driver' => DB::connection()->getDriverName(),
                          'tables' => $tableStatus,
                      ];
                  } catch (Exception $e) {
                      Log::error('Database health check failed', ['error' => $e->getMessage()]);

                      return [
                          'status' => 'unhealthy',
                          'error' => $e->getMessage(),
                      ];
                  }
              }

              private function checkCache(): array
              {
                  try {
                      $testKey = 'health_check_' . time();
                      $testValue = 'test_value_' . random_int(1000, 9999);

                      $start = microtime(true);
                      Cache::put($testKey, $testValue, 60);
                      $writeTime = round((microtime(true) - $start) * 1000, 2);

                      $start = microtime(true);
                      $retrieved = Cache::get($testKey);
                      $readTime = round((microtime(true) - $start) * 1000, 2);

                      Cache::forget($testKey);

                      if ($retrieved !== $testValue) {
                          throw new Exception('Cache read/write test failed');
                      }

                      return [
                          'status' => 'healthy',
                          'driver' => config('cache.default'),
                          'write_time_ms' => $writeTime,
                          'read_time_ms' => $readTime,
                      ];
                  } catch (Exception $e) {
                      Log::error('Cache health check failed', ['error' => $e->getMessage()]);

                      return [
                          'status' => 'unhealthy',
                          'error' => $e->getMessage(),
                      ];
                  }
              }

              private function checkQueue(): array
              {
                  try {
                      $connection = config('queue.default');

                      // For sync driver, always return healthy
                      if ($connection === 'sync') {
                          return [
                              'status' => 'healthy',
                              'driver' => 'sync'
                          ];
                      }

                      // For other drivers, check connection
                      $start = microtime(true);
                      $size = Queue::size();
                      $checkTime = round((microtime(true) - $start) * 1000, 2);

                      return [
                          'status' => 'healthy',
                          'driver' => $connection,
                          'queue_size' => $size,
                          'check_time_ms' => $checkTime,
                      ];
                  } catch (Exception $e) {
                      Log::error('Queue health check failed', ['error' => $e->getMessage()]);

                      return [
                          'status' => 'unhealthy',
                          'error' => $e->getMessage(),
                      ];
                  }
              }

              private function checkStorage(): array
              {
                  try {
                      $disk = config('filesystems.default');
                      $testFile = 'health_check_' . time() . '.txt';
                      $testContent = 'health check test';

                      // Write test
                      $start = microtime(true);
                      \Storage::disk($disk)->put($testFile, $testContent);
                      $writeTime = round((microtime(true) - $start) * 1000, 2);

                      // Read test
                      $start = microtime(true);
                      $content = \Storage::disk($disk)->get($testFile);
                      $readTime = round((microtime(true) - $start) * 1000, 2);

                      // Cleanup
                      \Storage::disk($disk)->delete($testFile);

                      if ($content !== $testContent) {
                          throw new Exception('Storage read/write test failed');
                      }

                      return [
                          'status' => 'healthy',
                          'disk' => $disk,
                          'write_time_ms' => $writeTime,
                          'read_time_ms' => $readTime,
                      ];
                  } catch (Exception $e) {
                      Log::error('Storage health check failed', ['error' => $e->getMessage()]);

                      return [
                          'status' => 'unhealthy',
                          'error' => $e->getMessage(),
                      ];
                  }
              }

              private function checkExternalApis(): array
              {
                  $apis = [];

                  // Check The Odds API if configured
                  if (config('odds-api.api_key')) {
                      try {
                          $start = microtime(true);
                          $response = \Http::timeout(5)->get(config('odds-api.base_url') . '/sports', [
                              'apiKey' => config('odds-api.api_key')
                          ]);
                          $responseTime = round((microtime(true) - $start) * 1000, 2);

                          $apis['odds_api'] = [
                              'status' => $response->successful() ? 'healthy' : 'unhealthy',
                              'response_time_ms' => $responseTime,
                              'status_code' => $response->status(),
                          ];
                      } catch (Exception $e) {
                          $apis['odds_api'] = [
                              'status' => 'unhealthy',
                              'error' => $e->getMessage(),
                          ];
                      }
                  } else {
                      $apis['odds_api'] = [
                          'status' => 'not_configured',
                          'message' => 'API key not configured',
                      ];
                  }

                  $overallStatus = collect($apis)->every(fn($api) => in_array($api['status'], ['healthy', 'not_configured']))
                      ? 'healthy'
                      : 'unhealthy';

                  return [
                      'status' => $overallStatus,
                      'apis' => $apis,
                  ];
              }

              private function formatBytes(int $bytes, int $precision = 2): string
              {
                  $units = ['B', 'KB', 'MB', 'GB', 'TB'];

                  for ($i = 0; $bytes > 1024 && $i < count($units) - 1; $i++) {
                      $bytes /= 1024;
                  }

                  return round($bytes, $precision) . ' ' . $units[$i];
              }
          }
          EOF

      - name: Add Health Routes
        run: |
          # Check if routes already exist
          if ! grep -q "HealthController" routes/api.php; then
            cat >> routes/api.php << 'EOF'

          // Health Check Routes
          Route::get('/health', [App\Http\Controllers\Api\HealthController::class, 'index']);
          Route::get('/health/detailed', [App\Http\Controllers\Api\HealthController::class, 'detailed']);
          Route::get('/health/database', [App\Http\Controllers\Api\HealthController::class, 'database']);
          Route::get('/health/cache', [App\Http\Controllers\Api\HealthController::class, 'cache']);
          Route::get('/health/queue', [App\Http\Controllers\Api\HealthController::class, 'queue']);
          EOF
          fi

      - name: Create Health Check PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Check if there are changes
            const { stdout } = await exec.getExecOutput('git', ['status', '--porcelain']);

            if (stdout.trim()) {
              // Create branch
              const branchName = `health-endpoints-${Date.now()}`;

              await exec.exec('git', ['config', 'user.name', 'github-actions[bot]']);
              await exec.exec('git', ['config', 'user.email', 'github-actions[bot]@users.noreply.github.com']);
              await exec.exec('git', ['checkout', '-b', branchName]);
              await exec.exec('git', ['add', '.']);
              await exec.exec('git', ['commit', '-m', 'feat: add comprehensive health check endpoints']);
              await exec.exec('git', ['push', 'origin', branchName]);

              // Create PR
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'feat: Add comprehensive health check endpoints',
                head: branchName,
                base: 'main',
                body: `## 🏥 Health Check Endpoints

                This PR adds comprehensive health check endpoints for monitoring application health.

                ### New Endpoints:
                - \`GET /api/health\` - Basic health check
                - \`GET /api/health/detailed\` - Detailed system health
                - \`GET /api/health/database\` - Database connectivity check
                - \`GET /api/health/cache\` - Cache system check
                - \`GET /api/health/queue\` - Queue system check

                ### Features:
                - ✅ Database connection and query testing
                - ✅ Cache read/write operations
                - ✅ Queue system verification
                - ✅ Storage system testing
                - ✅ External API connectivity
                - ✅ Performance metrics (response times)
                - ✅ System information (memory usage, versions)

                ### Usage:
                These endpoints are used by:
                - Load balancers for health checks
                - Monitoring systems (Uptime Robot, Pingdom, etc.)
                - CI/CD pipelines for deployment verification
                - Internal system monitoring

                **Auto-generated by health check workflow**`
              });
            }

  monitor-staging:
    name: Monitor Staging Environment
    runs-on: ubuntu-latest
    if: (github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'all' || github.event_name == 'schedule') && vars.STAGING_URL

    steps:
      - name: Basic Health Check
        run: |
          echo "🔍 Checking staging environment health..."

          STAGING_URL="${{ vars.STAGING_URL || secrets.STAGING_URL }}"

          # Basic health check
          if curl -f -s "$STAGING_URL/api/health" > health_basic.json; then
            echo "✅ Basic health check passed"
            cat health_basic.json | jq '.'
          else
            echo "❌ Basic health check failed"
            exit 1
          fi

      - name: Detailed Health Check
        run: |
          echo "🔍 Running detailed health checks..."

          STAGING_URL="${{ vars.STAGING_URL || secrets.STAGING_URL }}"

          # Detailed health check
          if curl -f -s "$STAGING_URL/api/health/detailed" > health_detailed.json; then
            echo "✅ Detailed health check passed"

            # Extract and display key metrics
            STATUS=$(cat health_detailed.json | jq -r '.status')
            DB_STATUS=$(cat health_detailed.json | jq -r '.checks.database.status')
            CACHE_STATUS=$(cat health_detailed.json | jq -r '.checks.cache.status')
            QUEUE_STATUS=$(cat health_detailed.json | jq -r '.checks.queue.status')

            echo "Overall Status: $STATUS"
            echo "Database: $DB_STATUS"
            echo "Cache: $CACHE_STATUS"
            echo "Queue: $QUEUE_STATUS"

            if [ "$STATUS" != "healthy" ]; then
              echo "❌ System is not fully healthy"
              cat health_detailed.json | jq '.checks'
              exit 1
            fi
          else
            echo "❌ Detailed health check failed"
            exit 1
          fi

      - name: Performance Check
        run: |
          echo "🚀 Checking staging performance..."

          STAGING_URL="${{ vars.STAGING_URL || secrets.STAGING_URL }}"

          # Test response times
          for endpoint in "/api/health" "/api/teams" "/api/players" "/api/games"; do
            echo "Testing $endpoint..."

            RESPONSE_TIME=$(curl -o /dev/null -s -w "%{time_total}" "$STAGING_URL$endpoint")
            RESPONSE_TIME_MS=$(echo "$RESPONSE_TIME * 1000" | bc)

            echo "$endpoint: ${RESPONSE_TIME_MS}ms"

            # Alert if response time is too high
            if (( $(echo "$RESPONSE_TIME > 2.0" | bc -l) )); then
              echo "⚠️ Slow response time for $endpoint: ${RESPONSE_TIME_MS}ms"
            fi
          done

  monitor-production:
    name: Monitor Production Environment
    runs-on: ubuntu-latest
    if: (github.event.inputs.environment == 'production' || github.event.inputs.environment == 'all' || github.event_name == 'schedule') && vars.PRODUCTION_URL

    steps:
      - name: Basic Health Check
        run: |
          echo "🔍 Checking production environment health..."

          PRODUCTION_URL="${{ vars.PRODUCTION_URL || secrets.PRODUCTION_URL }}"

          # Basic health check with retry logic
          for i in {1..3}; do
            if curl -f -s "$PRODUCTION_URL/api/health" > health_basic.json; then
              echo "✅ Basic health check passed (attempt $i)"
              cat health_basic.json | jq '.'
              break
            else
              echo "❌ Basic health check failed (attempt $i)"
              if [ $i -eq 3 ]; then
                exit 1
              fi
              sleep 10
            fi
          done

      - name: Comprehensive Health Check
        run: |
          echo "🔍 Running comprehensive production health checks..."

          PRODUCTION_URL="${{ vars.PRODUCTION_URL || secrets.PRODUCTION_URL }}"

          # Test all health endpoints
          ENDPOINTS=(
            "/api/health"
            "/api/health/database"
            "/api/health/cache"
            "/api/health/queue"
          )

          for endpoint in "${ENDPOINTS[@]}"; do
            echo "Checking $endpoint..."

            if curl -f -s "$PRODUCTION_URL$endpoint" > "health_${endpoint//\//_}.json"; then
              STATUS=$(cat "health_${endpoint//\//_}.json" | jq -r '.status')
              echo "✅ $endpoint: $STATUS"
            else
              echo "❌ $endpoint: FAILED"
              exit 1
            fi
          done

      - name: SSL Certificate Check
        run: |
          echo "🔒 Checking SSL certificate..."

          PRODUCTION_URL="${{ vars.PRODUCTION_URL || secrets.PRODUCTION_URL }}"
          DOMAIN=$(echo "$PRODUCTION_URL" | sed 's|https\?://||' | sed 's|/.*||')

          # Check SSL certificate expiration
          EXPIRY=$(echo | openssl s_client -servername "$DOMAIN" -connect "$DOMAIN:443" 2>/dev/null | openssl x509 -noout -enddate | cut -d= -f2)
          EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

          echo "SSL certificate expires in $DAYS_LEFT days"

          if [ $DAYS_LEFT -lt 30 ]; then
            echo "⚠️ SSL certificate expires soon: $DAYS_LEFT days"
          fi

          if [ $DAYS_LEFT -lt 7 ]; then
            echo "🚨 SSL certificate expires very soon: $DAYS_LEFT days"
            exit 1
          fi

  create-monitoring-alerts:
    name: Create Monitoring Alerts
    runs-on: ubuntu-latest
    needs: [monitor-staging, monitor-production]
    if: failure()

    steps:
      - name: Create Health Alert Issue
        uses: actions/github-script@v7
        with:
          script: |
            const stagingResult = '${{ needs.monitor-staging.result }}';
            const productionResult = '${{ needs.monitor-production.result }}';

            let alertLevel = 'warning';
            let alertTitle = '⚠️ Health Check Alert';

            if (productionResult === 'failure') {
              alertLevel = 'critical';
              alertTitle = '🚨 CRITICAL: Production Health Check Failed';
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: alertTitle,
              body: `## Health Check Status Report

              **Timestamp:** ${new Date().toISOString()}

              ### Environment Status:
              - **Staging:** ${stagingResult || 'not checked'}
              - **Production:** ${productionResult || 'not checked'}

              ### Immediate Actions Required:
              ${productionResult === 'failure' ? '1. 🚨 **URGENT:** Production is down - investigate immediately' : ''}
              ${stagingResult === 'failure' ? '2. ⚠️ Staging issues detected - may affect deployments' : ''}

              ### Investigation Steps:
              1. Check the workflow logs for detailed error information
              2. Verify database connectivity and performance
              3. Check cache and queue systems
              4. Review application logs for errors
              5. Verify external API connectivity

              ### Monitoring Links:
              - [View Workflow Run](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              - [Production Health](${process.env.PRODUCTION_URL}/api/health/detailed)
              - [Staging Health](${process.env.STAGING_URL}/api/health/detailed)

              **This is an automated alert. Please investigate and resolve immediately.**`,
              labels: [alertLevel, 'monitoring', 'health-check', 'automated']
            });

      - name: Notify Operations Team
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "channel": "#alerts",
              "text": "${{ needs.monitor-production.result == 'failure' && '🚨 PRODUCTION DOWN' || '⚠️ Health Check Alert' }}",
              "color": "${{ needs.monitor-production.result == 'failure' && 'danger' || 'warning' }}",
              "fields": [
                {
                  "title": "Staging Status",
                  "value": "${{ needs.monitor-staging.result || 'not checked' }}",
                  "short": true
                },
                {
                  "title": "Production Status",
                  "value": "${{ needs.monitor-production.result || 'not checked' }}",
                  "short": true
                },
                {
                  "title": "Timestamp",
                  "value": "${{ github.event.head_commit.timestamp }}",
                  "short": true
                }
              ],
              "actions": [
                {
                  "type": "button",
                  "text": "View Logs",
                  "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              ]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
