user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /tmp/nginx-access.log main;
    error_log /tmp/nginx-error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    server {
        listen PORT_PLACEHOLDER;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        # SvelteKit static assets - serve directly from build directory
        location /_app/ {
            alias /var/www/html/frontend-build/client/_app/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri @missing_asset;
        }

        # SvelteKit immutable assets
        location /immutable/ {
            alias /var/www/html/frontend-build/client/immutable/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri @missing_asset;
        }

        # SvelteKit static files
        location /favicon.png {
            alias /var/www/html/frontend-build/client/favicon.png;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri @missing_asset;
        }

        # Fallback for missing assets
        location @missing_asset {
            return 204;  # No content for missing assets
        }

        # API requests to Laravel with CORS headers
        location /api/ {
            # CORS headers for API endpoints
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            try_files $uri /index.php?$query_string;
        }

        # Health check endpoints (direct PHP) with CORS
        location ~ ^/(health|status|ping)$ {
            # CORS headers for health endpoints
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            try_files $uri /index.php?$query_string;
        }

        # Serve static assets from Laravel public directory
        location /build/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Handle PHP files
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Try SvelteKit first, fallback to Laravel for SPA routing
        location / {
            # Try to proxy to SvelteKit
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;

            # Fallback to Laravel if SvelteKit is not available
            error_page 502 503 504 = @laravel_fallback;
        }

        # Laravel fallback for SPA routing
        location @laravel_fallback {
            try_files $uri /index.php?$query_string;
        }
    }
}
